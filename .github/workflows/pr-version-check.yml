name: PR Version & Lockfile Check

on:
    pull_request:
        branches:
            - main
        paths:
            - "package.json"
            - "package-lock.json"
            - "**/*.ts"
            - "**/*.tsx"
        types:
            - opened
            - synchronize
            - reopened
            - labeled

jobs:
    check-version:
        runs-on: ubuntu-slim
        if: github.actor != 'dependabot[bot]' && !contains(github.event.pull_request.labels.*.name, 'ignore-version-bump')

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24 # 24 is the latest LTS version until October 2026
                  cache: "npm"

            - name: Get base package.json
              run: |
                  git fetch origin main
                  git show origin/main:package.json > base-package.json

            - name: Compare versions
              run: |
                  BASE_VERSION=$(node -p "require('./base-package.json').version")
                  PR_VERSION=$(node -p "require('./package.json').version")

                  echo "Base version: $BASE_VERSION"
                  echo "PR version: $PR_VERSION"

                  if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
                    echo "❌ Version was not bumped"
                    exit 1
                  fi
                    echo "✅ Version was bumped"
